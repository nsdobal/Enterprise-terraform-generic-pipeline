# pipeline-templates/src/steps/tf-fmt-validate-lint.yml
parameters:
  - name: workingDirectory
    type: string
  - name: runTFLint
    type: boolean
    default: true
  - name: executionStrategy
    type: string
    default: 'ubuntu-hosted'

steps:
  # =========================================================================
  # TASK 1: CORE FORMAT INSPECTION (WARNING BYPASS)
  # =========================================================================
  - script: |
      echo "=== Enforcing Format Rules ==="
      if [ -f "$(Agent.ToolsDirectory)/terraform_cache/terraform" ]; then
        TF_EXEC="$(Agent.ToolsDirectory)/terraform_cache/terraform"
      elif [ -f "/home/vsts/work/_tool/terraform_cache/terraform" ]; then
        TF_EXEC="/home/vsts/work/_tool/terraform_cache/terraform"
      else
        TF_EXEC="terraform"
      fi
      
      if ! $TF_EXEC fmt -check -recursive; then
        echo "##vso[task.logissue type=warning]WARNING: Some Terraform files are not properly formatted. Bypassing check seamlessly..."
      fi
    workingDirectory: '${{ parameters.workingDirectory }}'
    displayName: 'Core: Format Inspection'

  # =========================================================================
  # TASK 2: NATIVE STRUCTURAL VALIDATION (FIXES THE MISSING PROVIDER ERROR)
  # =========================================================================
  - task: TerraformTaskV4@4
    displayName: 'Core: Code Validation'
    inputs:
      provider: 'azurerm'
      command: 'validate'
      workingDirectory: '${{ parameters.workingDirectory }}'

  # =========================================================================
  # TASK 3: OPTIONAL DEEP CLOUD LINTING
  # =========================================================================
  - script: |
      echo "=== Launching TFLint Deep Analysis ==="
      if command -v tflint &> /dev/null; then
        tflint --init || echo "TFLint init bypassed."
        tflint -f compact
      else
        echo "TFLint engine missing. Bypassing..."
      fi
    workingDirectory: '${{ parameters.workingDirectory }}'
    displayName: 'Optional: Deep Cloud Linting'
    condition: eq('${{ parameters.runTFLint }}', true)